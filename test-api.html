<!doctype html><html lang="ru"><head><meta charset="utf-8"><title>Web3Forms test</title></head>
<body style="font-family:system-ui;padding:24px;background:#1a1c20;color:#eee">
<h1>Web3Forms test</h1>
<button id="b">Send test request</button>
<pre id="out" style="white-space:pre-wrap;margin-top:20px;padding:14px;background:#2c2f35;border-radius:8px"></pre>
<script>
document.getElementById('b').onclick=async()=>{
  const out=document.getElementById('out');
  out.textContent='Sending...';
  const fd=new FormData();
  fd.append('access_key','cd4f2ebd-5553-4446-9f51-a14d2d561a80');
  fd.append('subject','Тест Web3Forms из браузера');
  fd.append('from_name','Сайт КА-Строй');
  fd.append('name','Тест Devin');
  fd.append('phone','+7 999 000 00 01');
  fd.append('Интересующие услуги','Дорожные работы, Материалы');
  try{
    const r=await fetch('https://api.web3forms.com/submit',{method:'POST',body:fd,headers:{Accept:'application/json'}});
    const j=await r.json();
    out.textContent='HTTP '+r.status+' '+r.statusText+'\n\n'+JSON.stringify(j,null,2);
  }catch(e){
    out.textContent='FETCH ERROR: '+e.message;
  }
};
</script>
</body></html>
