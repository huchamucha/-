<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><title>Имитация конструктора</title>
<style>
  body{margin:0;font-family:Arial,sans-serif;background:#fff}
  .fake-header{background:#fff;padding:20px;text-align:center;border-bottom:1px solid #eee}
  .fake-header .logo{display:inline-block;width:40px;height:40px;background:linear-gradient(135deg,#1f2227 0%,#363a41 100%);border-radius:6px;vertical-align:middle;margin-right:18px}
  .fake-header nav{display:inline-block;vertical-align:middle}
  .fake-header nav a{margin:0 14px;color:#666;text-decoration:none;font-size:14px}
  /* Этот контейнер имитирует тот, в который Рег.ру оборачивает HTML-блок: */
  .fake-container{max-width:800px;margin:0 auto;padding:30px;background:#f5f5f5}
</style>
</head>
<body>
  <div class="fake-header">
    <span class="logo"></span>
    <nav>
      <a href="#">Главная страница</a><a href="#">О нас</a><a href="#">Каталог</a><a href="#">Контакты</a>
    </nav>
  </div>
  <div class="fake-container">
    <p style="color:#888">Имитация контейнера конструктора (max-width 800px). Ниже — HTML-вставка КА-Строй:</p>
    <iframe src="index.html" style="width:100%;height:5000px;border:0"></iframe>
  </div>
  <p style="text-align:center;color:#aaa;padding:20px">Конец</p>
</body></html>
